name: CreateRelease 

on:
  push:
    tags:
      - 'v*'  
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: 'true'  

      - name: 
        uses: softprops/action-gh-release@v1
        with:
          files: |
            node-22.23.1/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
